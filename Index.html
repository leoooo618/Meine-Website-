<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Lokale Helfer finden</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-indigo-600 text-white p-10 shadow-xl">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-4xl font-black mb-6">ServiceNah 📍</h1>
            <div class="flex flex-col md:row gap-3 bg-white p-2 rounded-2xl">
                <input type="text" id="searchInput" placeholder="Suchen..." class="flex-1 p-4 text-black outline-none" onkeyup="renderServices()">
                <select id="categoryInput" class="p-4 text-black bg-gray-100 rounded-xl" onchange="renderServices()">
                    <option value="Alle">Alle Kategorien</option>
                    <option value="Handwerk">Handwerk</option>
                    <option value="Pflege">Pflege</option>
                    <option value="Essen">Essen</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-8">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        // HIER kannst du ganz einfach neue Dienste hinzufügen!
        const alleDienste = [
            { name: "Malerprofi Hans", kat: "Handwerk", preis: "30€/Std", distanz: "1.2 km", info: "Renovierung & Anstrich." },
            { name: "Gartenhilfe Lisa", kat: "Pflege", preis: "20€/Std", distanz: "4.5 km", info: "Rasenmähen & Hecken." },
            { name: "Pizza Anti", kat: "Essen", preis: "12€/Stk", distanz: "0.5 km", info: "Steinofen-Qualität." },
            { name: "Seniorenhilfe Marco", kat: "Pflege", preis: "25€/Std", distanz: "2.1 km", info: "Einkaufshilfe & Begleitung." },
            { name: "Elektro-Fix", kat: "Handwerk", preis: "45€/Std", distanz: "3.8 km", info: "Lampen & Steckdosen." }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const suche = document.getElementById('searchInput').value.toLowerCase();
            const katFilter = document.getElementById('categoryInput').value;
            
            grid.innerHTML = ""; // Erstmal alles leeren

            alleDienste.forEach(dienst => {
                const passtSuche = dienst.name.toLowerCase().includes(suche);
                const passtKat = (katFilter === "Alle" || dienst.kat === katFilter);

                if (passtSuche && passtKat) {
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-md p-6 border hover:shadow-2xl transition">
                            <span class="text-xs font-bold uppercase text-indigo-500">${dienst.kat}</span>
                            <h2 class="text-xl font-bold mt-2">${dienst.name}</h2>
                            <p class="text-gray-500 text-sm mt-1">${dienst.info}</p>
                            <div class="mt-4 flex justify-between items-center pt-4 border-t">
                                <span class="font-bold text-green-600">${dienst.preis}</span>
                                <span class="text-xs text-gray-400">📍 ${dienst.distanz}</span>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // Beim ersten Laden der Seite ausführen
        renderServices();
    </script>
</body>
</html>
