<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Finden & Kontaktieren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-indigo-600 text-white p-8 shadow-lg">
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-3xl font-bold mb-4">ServiceNah 📍</h1>
            <input type="text" id="searchInput" placeholder="Suche..." class="w-full max-w-md p-3 rounded-lg text-black outline-none" onkeyup="renderServices()">
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="detailModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto p-6">
            <div id="modalContent">
                </div>
            <button class="mt-6 w-full bg-gray-200 p-3 rounded-xl font-bold" onclick="closeModal()">Schließen</button>
        </div>
    </div>

    <script>
        const alleDienste = [
            { id: 1, name: "Malerprofi Hans", kat: "Handwerk", preis: "30€/Std", tel: "0151-123456", adresse: "Hauptstraße 10, Berlin", info: "Spezialist für Innenanstriche." },
            { id: 2, name: "Gartenhilfe Lisa", kat: "Pflege", preis: "20€/Std", tel: "0160-987654", adresse: "Blumenweg 5, Berlin", info: "Rasenpflege und Heckenschnitt." },
            { id: 3, name: "Pizza Anti", kat: "Essen", preis: "12€/Stk", tel: "030-554433", adresse: "Marktplatz 2, Berlin", info: "Hausgemacht im Steinofen." }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const suche = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";

            alleDienste.forEach(d => {
                if (d.name.toLowerCase().includes(suche)) {
                    grid.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl shadow border hover:border-indigo-500 cursor-pointer transition" onclick="openModal(${d.id})">
                            <span class="text-xs font-bold text-indigo-500 uppercase">${d.kat}</span>
                            <h2 class="text-xl font-bold mt-1">${d.name}</h2>
                            <p class="text-gray-500 text-sm mt-2">${d.info}</p>
                            <div class="mt-4 text-green-600 font-bold">${d.preis}</div>
                            <button class="mt-4 w-full text-indigo-600 text-sm font-semibold underline">Details & Karte</button>
                        </div>
                    `;
                }
            });
        }

        function openModal(id) {
            const d = alleDienste.find(item => item.id === id);
            const content = document.getElementById('modalContent');
            const mapUrl = `https://www.google.com/maps/search/${encodeURIComponent(d.adresse)}`;
            
            content.innerHTML = `
                <h2 class="text-2xl font-bold text-indigo-700">${d.name}</h2>
                <p class="text-gray-600 my-4">${d.info}</p>
                <div class="space-y-3">
                    <div class="flex items-center gap-2">
                        <span>📞</span> <a href="tel:${d.tel}" class="text-blue-600 font-bold">${d.tel}</a>
                    </div>
                    <div class="flex items-center gap-2">
                        <span>📍</span> <p class="text-gray-700">${d.adresse}</p>
                    </div>
                </div>
                <a href="${mapUrl}" target="_blank" class="mt-6 block text-center bg-green-500 text-white p-4 rounded-xl font-bold shadow-lg">
                    Auf Karte zeigen (Google Maps)
                </a>
            `;
            
            const modal = document.getElementById('detailModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        renderServices();
    </script>
</body>
</html>
