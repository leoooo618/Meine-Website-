<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Finden & Kontaktieren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { transition: opacity 0.25s ease; z-index: 100; }
        .modal-active { overflow: hidden; }
        .service-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-indigo-700 text-white p-6 md:p-10 shadow-xl sticky top-0 z-40">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-3xl font-black mb-6 text-center">ServiceNah 📍</h1>
            
            <div class="flex flex-col md:flex-row gap-3 bg-white p-2 rounded-2xl shadow-inner">
                <input type="text" id="searchInput" placeholder="Was suchst du?" 
                       class="flex-1 p-4 rounded-xl text-black focus:outline-none bg-transparent" 
                       onkeyup="renderServices()">
                
                <select id="categoryInput" 
                        class="p-4 rounded-xl text-gray-700 bg-gray-100 border-none font-semibold outline-none" 
                        onchange="renderServices()">
                    <option value="Alle">Alle Kategorien</option>
                    <option value="Handwerk">Handwerk</option>
                    <option value="Pflege">Pflege</option>
                    <option value="Essen">Essen & Trinken</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="detailModal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black opacity-60" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl z-50 overflow-hidden relative">
            <div id="modalContent" class="p-8">
                </div>
            <div class="p-6 bg-gray-50 border-t">
                <button class="w-full bg-gray-200 text-gray-800 py-3 rounded-xl font-bold hover:bg-gray-300 transition" onclick="closeModal()">Schließen</button>
            </div>
        </div>
    </div>

    <script>
        // Deine Datenbank (Hier kannst du beliebig erweitern)
        const alleDienste = [
            { id: 1, name: "Malerprofi Hans", kat: "Handwerk", preis: "30€/Std", tel: "0151123456", adresse: "Hauptstraße 10, Tönning", info: "Spezialist für Innenanstriche und Fassaden." },
            { id: 2, name: "Gartenhilfe Lisa", kat: "Pflege", preis: "20€/Std", tel: "0160987654", adresse: "Blumenweg 5, Tönning", info: "Rasenpflege, Heckenschnitt und Gartenpflege." },
            { id: 3, name: "Pizza Anti", kat: "Essen", preis: "12€/Stk", tel: "048615544", adresse: "Marktplatz 2, Tönning", info: "Echte Steinofenpizza aus der Nachbarschaft." },
            { id: 4, name: "Seniorenbegleitung", kat: "Pflege", preis: "25€/Std", tel: "0172112233", adresse: "Badallee 1, Tönning", info: "Unterstützung im Alltag und Begleitung." }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const suche = document.getElementById('searchInput').value.toLowerCase();
            const katFilter = document.getElementById('categoryInput').value;
            
            grid.innerHTML = "";

            alleDienste.forEach(d => {
                const passtSuche = d.name.toLowerCase().includes(suche) || d.info.toLowerCase().includes(suche);
                const passtKat = (katFilter === "Alle" || d.kat === katFilter);

                if (passtSuche && passtKat) {
                    grid.innerHTML += `
                        <div class="service-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:border-indigo-300 cursor-pointer transition-all" onclick="openModal(${d.id})">
                            <span class="text-[10px] font-black tracking-widest text-indigo-500 uppercase">${d.kat}</span>
                            <h2 class="text-2xl font-bold mt-2 text-gray-800">${d.name}</h2>
                            <p class="text-gray-500 text-sm mt-2 line-clamp-2">${d.info}</p>
                            <div class="mt-6 flex justify-between items-center border-t pt-4">
                                <span class="font-bold text-green-600">${d.preis}</span>
                                <span class="text-indigo-600 text-sm font-bold">Details →</span>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function openModal(id) {
            const d = alleDienste.find(item => item.id === id);
            const content = document.getElementById('modalContent');
            // Erstellt den Google Maps Link
            const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.name + ' ' + d.adresse)}`;
            
            content.innerHTML = `
                <span class="text-xs font-bold text-indigo-500 uppercase tracking-widest">${d.kat}</span>
                <h2 class="text-3xl font-black text-gray-900 mt-2">${d.name}</h2>
                <p class="text-gray-600 my-6 text-lg leading-relaxed">${d.info}</p>
                
                <div class="space-y-4">
                    <a href="tel:${d.tel}" class="flex items-center gap-4 bg-green-50 p-4 rounded-2xl border border-green-100 group hover:bg-green-100 transition">
                        <span class="text-2xl">📞</span>
                        <div>
                            <p class="text-xs text-green-600 font-bold uppercase">Anrufen</p>
                            <p class="text-lg font-bold text-green-800">${d.tel}</p>
                        </div>
                    </a>
                    
                    <a href="${mapLink}" target="_blank" class="flex items-center gap-4 bg-blue-50 p-4 rounded-2xl border border-blue-100 hover:bg-blue-100 transition">
                        <span class="text-2xl">📍</span>
                        <div>
                            <p class="text-xs text-blue-600 font-bold uppercase">Adresse & Karte</p>
                            <p class="text-lg font-bold text-blue-800">${d.adresse}</p>
                        </div>
                    </a>
                </div>
            `;
            
            const modal = document.getElementById('detailModal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        // Start
        renderServices();
    </script>
</body>
  </html>
