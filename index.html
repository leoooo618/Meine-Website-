<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Dein regionales Netzwerk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .business-card { transition: all 0.3s ease; }
        .hidden { display: none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans flex flex-col min-h-screen">

    <header class="bg-blue-950 text-white py-12 px-4 text-center shadow-2xl relative">
        <h1 class="text-5xl font-black italic tracking-tight">Service<span class="text-blue-400">Nah</span></h1>
        <p class="text-blue-200 mt-2 font-light">Lokale Helden & Mini-Webseiten für Nordfriesland.</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 -mt-10 relative z-10 w-full">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-blue-100 grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="cityFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:ring-2 focus:ring-blue-500" onchange="renderServices()">
                <option value="all">Alle Städte</option>
                <option value="Tönning">Tönning</option>
                <option value="Garding">Garding</option>
                <option value="Husum">Husum</option>
            </select>
            <select id="categoryFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:ring-2 focus:ring-blue-500" onchange="renderServices()">
                <option value="all">Alle Branchen</option>
                <option value="Handwerk">🏠 Handwerk</option>
                <option value="Hotel">🏨 Hotel / FeWo</option>
                <option value="Shop">🎁 Laden / Souvenirs</option>
                <option value="Womo">🚐 Wohnmobile</option>
            </select>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Suche..." class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onkeyup="renderServices()">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-4 text-slate-400"></i>
            </div>
        </div>
    </section>

    <main class="max-w-6xl mx-auto p-6 mt-8 flex-grow w-full">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-8 shadow-2xl relative animate-in fade-in zoom-in duration-200">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900 text-3xl">&times;</button>
            
            <div id="modalCategory" class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-2">Kategorie</div>
            <h2 id="modalTitle" class="text-4xl font-black text-blue-950 mb-2 italic leading-tight">Name</h2>
            <div id="modalStars" class="text-yellow-400 mb-6 text-sm"></div>
            
            <p id="modalDescription" class="text-slate-600 mb-8 text-lg leading-relaxed border-l-4 border-blue-500 pl-4 italic">Beschreibung...</p>
            
            <div class="space-y-3 mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <div class="flex items-center text-slate-700 font-semibold">
                    <i class="fa-solid fa-location-dot w-8 text-blue-500 text-xl"></i> <span id="modalLocation">Stadt</span>
                </div>
                <div class="flex items-center text-slate-700 font-semibold">
                    <i class="fa-solid fa-phone w-8 text-blue-500 text-xl"></i> <span id="modalPhoneDisplay">00000</span>
                </div>
            </div>

            <div class="flex gap-3">
                <a id="callAction" href="#" class="flex-1 bg-blue-600 text-white text-center py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 transition">Anrufen</a>
                <a id="whatsappAction" href="#" class="flex-1 bg-green-500 text-white text-center py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-green-600 transition"><i class="fa-brands fa-whatsapp text-xl"></i></a>
            </div>
        </div>
    </div>

    <footer class="mt-20 py-12 bg-white border-t text-center text-slate-400 text-sm">
        <div class="flex justify-center gap-8 mb-6 font-bold text-blue-900 uppercase tracking-widest text-xs">
            <button onclick="openModal('Impressum', '<strong>ServiceNah Tönning</strong><br>Inhaber: [DEIN NAME]<br>[STRASSE NR]<br>25832 Tönning<br><br>E-Mail: [DEINE MAIL]', '-')" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-500 pb-1">Impressum</button>
            
            <button onclick="openModal('Datenschutz', '<strong>Datenschutzerklärung</strong><br><br>Diese Website nutzt Cloudflare Pages. Es werden technisch notwendige Log-Daten (IP-Adresse) verarbeitet. Es findet kein Tracking statt.<br><br><strong>Verantwortlich:</strong> [DEIN NAME]', '-')" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-500 pb-1">Datenschutz</button>
        </div>
        <p class="text-slate-400">&copy; 2026 ServiceNah - Das Netzwerk für den Norden.</p>
    </footer>

    <script>
        // Datenbank der Partner
        const partnerDaten = [
            {
                name: "Malerbetrieb Nordlicht",
                stadt: "Tönning",
                kategorie: "Handwerk",
                sterne: 5,
                beschreibung: "Ihr Profi für Fassaden und Innenräume in Tönning. Wir bringen Farbe in Ihr Leben - zuverlässig und regional.",
                telefon: "0486112345",
                bild: "fa-paint-roller"
            },
            {
                name: "Eider-Residenz",
                stadt: "Tönning",
                kategorie: "Hotel",
                sterne: 4.5,
                beschreibung: "Exklusive Übernachtungen direkt am Hafen. Genießen Sie den Blick auf die Eider und unseren erstklassigen Service.",
                telefon: "0486198765",
                bild: "fa-hotel"
            },
            {
                name: "Womo-Hafenblick",
                stadt: "Garding",
                kategorie: "Womo",
                sterne: 4,
                beschreibung: "Ruhiger Stellplatz für Wohnmobile mit Vollausstattung. Nur 10 Minuten bis zum Strand.",
                telefon: "0172555666",
                bild: "fa-caravan"
            }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const city = document.getElementById('cityFilter').value;
            const cat = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';

            partnerDaten.forEach((p, index) => {
                const matchCity = city === 'all' || p.stadt === city;
                const matchCat = cat === 'all' || p.kategorie === cat;
                const matchSearch = p.name.toLowerCase().includes(search);

                if(matchCity && matchCat && matchSearch) {
                    const card = `
                        <div class="business-card bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col p-8">
                            <div class="h-16 w-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 text-blue-600 text-3xl shadow-inner">
                                <i class="fa-solid ${p.bild}"></i>
                            </div>
                            <span class="text-blue-500 font-black text-[10px] uppercase tracking-[0.2em] mb-1">${p.kategorie} • ${p.stadt}</span>
                            <h3 class="text-2xl font-bold text-slate-800 leading-tight">${p.name}</h3>
                            <div class="text-yellow-400 text-xs mt-3 flex items-center gap-1 italic">
                                ${'<i class="fa-solid fa-star"></i>'.repeat(Math.floor(p.sterne))} 
                                <span class="text-slate-400 ml-1 font-bold">(${p.sterne})</span>
                            </div>
                            <button onclick="openModal(${index}, true)" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-600 transition shadow-md">Details öffnen</button>
                        </div>
                    `;
                    grid.innerHTML += card;
                }
            });
        }

        function openModal(input, isIndex = false) {
            if(isIndex) {
                // Partner-Modus
                const p = partnerDaten[input];
                document.getElementById('modalTitle').innerText = p.name;
                document.getElementById('modalCategory').innerText = p.kategorie + " • " + p.stadt;
                document.getElementById('modalDescription').innerHTML = p.beschreibung;
                document.getElementById('modalLocation').innerText = p.stadt;
                document.getElementById('modalPhoneDisplay').innerText = p.telefon;
                document.getElementById('callAction').href = "tel:" + p.telefon;
                document.getElementById('whatsappAction').classList.remove('hidden');
                document.getElementById('whatsappAction').href = "https://wa.me/" + p.telefon.replace(/\s+/g, '');
                
                let sterneHTML = '';
                for(let i=0; i<Math.floor(p.sterne); i++) sterneHTML += '<i class="fa-solid fa-star"></i>';
                document.getElementById('modalStars').innerHTML = sterneHTML + ` <span class="text-slate-400 font-bold ml-1">(${p.sterne})</span>`;
            } else {
                // Rechts-Modus (Impressum/Datenschutz)
                document.getElementById('modalTitle').innerText = input; // Hier ist input der Titel
                document.getElementById('modalCategory').innerText = "Rechtliches";
                document.getElementById('modalDescription').innerHTML = arguments[1]; // Beschreibung aus dem Funktionsaufruf
                document.getElementById('modalLocation').innerText = "Tönning";
                document.getElementById('modalPhoneDisplay').innerText = "-";
                document.getElementById('modalStars').innerHTML = "";
                document.getElementById('whatsappAction').classList.add('hidden');
                document.getElementById('callAction').href = "#";
            }
            
            document.getElementById('detailModal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        renderServices();
    </script>
</body>
</html>
