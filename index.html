<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Lokales Verzeichnis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .business-card { transition: all 0.3s ease; }
        .hidden { display: none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-blue-950 text-white py-12 px-4 text-center shadow-2xl">
        <h1 class="text-5xl font-black italic">Service<span class="text-blue-400">Nah</span></h1>
        <p class="text-blue-200 mt-2">Die "Mini-Website" für lokale Helden in Nordfriesland.</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 -mt-10 relative z-10">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-blue-100 grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="cityFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none" onchange="renderServices()">
                <option value="all">Alle Städte</option>
                <option value="Tönning">Tönning</option>
                <option value="Garding">Garding</option>
                <option value="Husum">Husum</option>
            </select>
            <select id="categoryFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none" onchange="renderServices()">
                <option value="all">Alle Branchen</option>
                <option value="Handwerk">Handwerk</option>
                <option value="Hotel">Hotel / Ferienwohnung</option>
                <option value="Shop">Laden / Souvenirs</option>
                <option value="Womo">Wohnmobilstellplatz</option>
            </select>
            <input type="text" id="searchInput" placeholder="Suchen..." class="p-3 bg-slate-50 border rounded-xl outline-none" onkeyup="renderServices()">
        </div>
    </section>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] max-w-lg w-full p-8 shadow-2xl relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900 text-3xl">&times;</button>
            
            <div id="modalCategory" class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-2">Kategorie</div>
            <h2 id="modalTitle" class="text-4xl font-black text-blue-950 mb-2 italic leading-tight">Name</h2>
            
            <div id="modalStars" class="text-yellow-400 mb-6"></div>
            
            <p id="modalDescription" class="text-slate-600 mb-8 text-lg leading-relaxed border-l-4 border-blue-500 pl-4">Beschreibung...</p>
            
            <div class="space-y-3 mb-8">
                <div class="flex items-center text-slate-700 font-medium">
                    <i class="fa-solid fa-location-dot w-8 text-blue-500"></i> <span id="modalLocation">Stadt</span>
                </div>
                <div class="flex items-center text-slate-700 font-medium">
                    <i class="fa-solid fa-phone w-8 text-blue-500"></i> <span id="modalPhoneDisplay">00000</span>
                </div>
            </div>

            <div class="flex gap-3">
                <a id="callAction" href="#" class="flex-1 bg-blue-600 text-white text-center py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-blue-700 transition">Anrufen</a>
                <a id="whatsappAction" href="#" class="flex-1 bg-green-500 text-white text-center py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-green-600 transition">WhatsApp</a>
            </div>
        </div>
    </div>

        <footer class="mt-20 py-12 bg-white border-t text-center text-slate-400 text-sm">
        <div class="flex justify-center gap-6 mb-4 font-bold">
            <button onclick="openModal('Impressum', 'ServiceNah Tönning<br>Inhaber: [Leo] [Jens]<br>[Neustadt & 6]<br>25832 Tönning<br><br>E-mail: [Leo.jens1906@gmail.com]<br>Verantwortlich für den Inhalt nach § 5 TMG.', '-')" class="hover:text-blue-600 transition">Impressum</button>
            
            <button onclick="openModal('Datenschutz', '<strong>1. Datenschutz auf einen Blick</strong><br>Wir behandeln Ihre Daten vertraulich. Diese Website wird über Cloudflare Pages gehostet. Dabei werden technisch notwendige Log-Daten (z.B. IP-Adresse) verarbeitet, um die Sicherheit und Geschwindigkeit der Seite zu gewährleisten.<br><br><strong>2. Keine Cookies</strong><br>Diese Seite verwendet keine Marketing-Cookies oder Tracking-Tools.<br><br><strong>3. Ihre Rechte</strong><br>Sie haben das Recht auf Auskunft und Löschung Ihrer Daten gemäß DSGVO.', '-')" class="hover:text-blue-600 transition">Datenschutz</button>
        </div>
        <p>&copy; 2026 ServiceNah - Das lokale Netzwerk für Tönning & Umgebung</p>
    </footer>


    <script>
        // HIER FÜGST DU NEUE UNTERNEHMEN EIN:
        const partnerDaten = [
            {
                name: "Malerbetrieb Nordlicht",
                stadt: "Tönning",
                kategorie: "Handwerk",
                sterne: 5,
                beschreibung: "Ihr Profi für Fassaden und Innenräume in Tönning. Wir bringen Farbe in Ihr Leben - zuverlässig und regional.",
                telefon: "0486112345",
                bild: "fa-paint-roller"
            },
            {
                name: "Eider-Residenz",
                stadt: "Tönning",
                kategorie: "Hotel",
                sterne: 4.5,
                beschreibung: "Exklusive Übernachtungen direkt am Hafen. Genießen Sie den Blick auf die Eider und unseren erstklassigen Service.",
                telefon: "0486198765",
                bild: "fa-hotel"
            },
            {
                name: "Womo-Hafenblick",
                stadt: "Garding",
                kategorie: "Womo",
                sterne: 4,
                beschreibung: "Ruhiger Stellplatz für Wohnmobile mit Vollausstattung. Nur 10 Minuten bis zum Strand.",
                telefon: "0172555666",
                bild: "fa-caravan"
            },
            {
                name: "Bernstein & Meer",
                stadt: "Husum",
                kategorie: "Shop",
                sterne: 5,
                beschreibung: "Handgefertigter Schmuck und Souvenirs aus echtem Nordsee-Bernstein. Ein Stück Heimat zum Mitnehmen.",
                telefon: "0484133445",
                bild: "fa-gem"
            }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const cityFilter = document.getElementById('cityFilter').value;
            const catFilter = document.getElementById('categoryFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';

            partnerDaten.forEach((p, index) => {
                const matchCity = cityFilter === 'all' || p.stadt === cityFilter;
                const matchCat = catFilter === 'all' || p.kategorie === catFilter;
                const matchSearch = p.name.toLowerCase().includes(searchTerm);

                if(matchCity && matchCat && matchSearch) {
                    const card = `
                        <div class="business-card bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col p-6">
                            <div class="h-12 w-12 bg-blue-100 rounded-xl flex items-center justify-center mb-4 text-blue-600 text-xl">
                                <i class="fa-solid ${p.bild}"></i>
                            </div>
                            <span class="text-blue-500 font-bold text-[10px] uppercase tracking-widest">${p.kategorie} • ${p.stadt}</span>
                            <h3 class="text-2xl font-bold text-slate-800 mt-1 leading-tight">${p.name}</h3>
                            <div class="text-yellow-400 text-xs mt-2 italic">
                                ${'<i class="fa-solid fa-star"></i>'.repeat(Math.floor(p.sterne))} 
                                <span class="text-slate-400 ml-1 font-bold">(${p.sterne})</span>
                            </div>
                            <button onclick="openModal(${index})" class="mt-6 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 transition shadow-sm">Mini-Seite öffnen</button>
                        </div>
                    `;
                    grid.innerHTML += card;
                }
            });
        }

        function openModal(index) {
            const p = partnerDaten[index];
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalCategory').innerText = p.kategorie + " • " + p.stadt;
            document.getElementById('modalDescription').innerText = p.beschreibung;
            document.getElementById('modalLocation').innerText = p.stadt;
            document.getElementById('modalPhoneDisplay').innerText = p.telefon;
            document.getElementById('callAction').href = "tel:" + p.telefon;
            document.getElementById('whatsappAction').href = "https://wa.me/" + p.telefon.replace(/\s+/g, '');
            
            // Sterne im Modal
            let sterneHTML = '';
            for(let i=0; i<Math.floor(p.sterne); i++) sterneHTML += '<i class="fa-solid fa-star"></i>';
            document.getElementById('modalStars').innerHTML = sterneHTML + ` <span class="text-slate-400 font-bold">(${p.sterne})</span>`;

            document.getElementById('detailModal').classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        // Initiales Laden
        renderServices();
    </script>
</body>
</html>
