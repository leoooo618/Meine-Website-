<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNah | Tönning & Umgebung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .business-card { transition: all 0.3s ease; }
        .hidden { display: none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans flex flex-col min-h-screen">

    <header class="bg-blue-950 text-white py-12 px-4 text-center shadow-2xl relative">
        <h1 class="text-5xl font-black italic tracking-tight">Service<span class="text-blue-400">Nah</span></h1>
        <p class="text-blue-200 mt-2 font-light">Echte Betriebe & lokale Helden aus Nordfriesland.</p>
    </header>

    <section class="max-w-6xl mx-auto px-4 -mt-10 relative z-10 w-full">
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-blue-100 grid grid-cols-1 md:grid-cols-3 gap-4">
            <select id="cityFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:ring-2 focus:ring-blue-500" onchange="renderServices()">
                <option value="all">Alle Städte</option>
                <option value="Tönning">Tönning</option>
                <option value="Garding">Garding</option>
                <option value="Husum">Husum</option>
            </select>
            <select id="categoryFilter" class="p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:ring-2 focus:ring-blue-500" onchange="renderServices()">
                <option value="all">Alle Branchen</option>
                <option value="Handwerk">🏠 Handwerk</option>
                <option value="Hotel">🏨 Hotel / FeWo</option>
                <option value="Shop">🎁 Laden / Souvenirs</option>
                <option value="Womo">🚐 Wohnmobile</option>
            </select>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Firma suchen..." class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" onkeyup="renderServices()">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-4 text-slate-400"></i>
            </div>
        </div>
    </section>

    <main class="max-w-6xl mx-auto p-6 mt-8 flex-grow w-full">
        <div id="servicesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center">
            </div>

        <div class="mt-20 bg-gradient-to-br from-blue-900 to-blue-800 p-10 rounded-[3rem] text-white shadow-2xl text-center relative overflow-hidden">
            <h2 class="text-3xl font-bold italic mb-4">Partner werden</h2>
            <p class="text-blue-100 max-w-2xl mx-auto mb-8 font-light">Möchten Sie Ihren Betrieb kostenlos hier eintragen lassen?</p>
            <a href="mailto:DEINE-MAIL@ADRESSE.DE?subject=Anmeldung%20ServiceNah&body=Moin!%0A%0AHiermit%20melde%20ich%20meinen%20Betrieb%20an:" 
               class="inline-block bg-white text-blue-900 px-10 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-50 transition shadow-lg">
               Anmeldung per E-Mail
            </a>
        </div>
    </main>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-900 text-3xl">&times;</button>
            <div id="modalCategory" class="text-blue-600 font-bold text-[10px] uppercase tracking-widest mb-2">Kategorie</div>
            <h2 id="modalTitle" class="text-4xl font-black text-blue-950 mb-2 italic">Name</h2>
            <div id="modalStars" class="text-yellow-400 mb-4 text-sm"></div>
            <div id="modalDescription" class="text-slate-600 mb-8 text-lg leading-relaxed border-l-4 border-blue-500 pl-4 italic">Beschreibung...</div>
            <div id="modalContactBox" class="space-y-3 mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-100 text-left">
                <div class="flex items-center text-slate-700 font-semibold"><i class="fa-solid fa-location-dot w-8 text-blue-500"></i> <span id="modalLocation">Stadt</span></div>
                <div class="flex items-center text-slate-700 font-semibold"><i class="fa-solid fa-phone w-8 text-blue-500"></i> <span id="modalPhoneDisplay">00000</span></div>
            </div>
            <div id="modalActions" class="flex gap-3">
                <a id="callAction" href="#" class="flex-1 bg-blue-600 text-white text-center py-4 rounded-2xl font-black uppercase tracking-widest">Anrufen</a>
                <a id="whatsappAction" href="#" class="flex-1 bg-green-500 text-white text-center py-4 rounded-2xl font-black uppercase flex items-center justify-center"><i class="fa-brands fa-whatsapp text-2xl"></i></a>
            </div>
        </div>
    </div>

    <footer class="mt-20 py-12 bg-white border-t text-center text-slate-400 text-sm">
        <div class="flex justify-center gap-8 mb-6 font-bold text-blue-900 uppercase tracking-widest text-xs">
            <button onclick="openLegal('Impressum', '<strong>Inhaber:</strong> [DEIN NAME]<br>[STRASSE]<br>25832 Tönning')" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-500 pb-1">Impressum</button>
            <button onclick="openLegal('Datenschutz', 'Diese Seite nutzt Cloudflare Pages. Es werden keine Cookies verwendet.')" class="hover:text-blue-500 transition border-b-2 border-transparent hover:border-blue-500 pb-1">Datenschutz</button>
        </div>
        <p>&copy; 2026 ServiceNah Tönning</p>
    </footer>

    <script>
        // DIE ECHTEN DATEN
        const partnerDaten = [
            { name: "Malerbetrieb Kohls", stadt: "Tönning", kategorie: "Handwerk", sterne: 5, beschreibung: "Ihr kompetenter Partner für Maler- und Lackierarbeiten direkt in Tönning.", telefon: "048615424", bild: "fa-paint-roller" },
            { name: "Wohnmobilpark Tönning", stadt: "Tönning", kategorie: "Womo", sterne: 4.5, beschreibung: "Top-Stellplatz direkt an der Eider. Mit Strom und Sanitäranlagen.", telefon: "048616140", bild: "fa-caravan" },
            { name: "BEBio Hotel am Hafen", stadt: "Tönning", kategorie: "Hotel", sterne: 4.7, beschreibung: "Nachhaltig übernachten im historischen Packhaus am Tönninger Hafen.", telefon: "048619090", bild: "fa-hotel" },
            { name: "Bernstein-Kontor", stadt: "Tönning", kategorie: "Shop", sterne: 4.8, beschreibung: "Schmuck aus Bernstein und regionales Kunsthandwerk am Marktplatz.", telefon: "04861617148", bild: "fa-gem" },
            { name: "Hofladen Baumbach", stadt: "Garding", kategorie: "Shop", sterne: 4.9, beschreibung: "Frische Produkte direkt vom Bauernhof in Garding.", telefon: "048628138", bild: "fa-store" }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const city = document.getElementById('cityFilter').value;
            const cat = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';

            partnerDaten.forEach((p, index) => {
                if((city === 'all' || p.stadt === city) && (cat === 'all' || p.kategorie === cat) && p.name.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="business-card bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8 flex flex-col items-center">
                            <div class="h-16 w-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-6 text-blue-600 text-3xl shadow-inner"><i class="fa-solid ${p.bild}"></i></div>
                            <span class="text-blue-500 font-black text-[10px] uppercase tracking-widest">${p.kategorie} • ${p.stadt}</span>
                            <h3 class="text-2xl font-bold text-slate-800 leading-tight mt-1">${p.name}</h3>
                            <button onclick="openPartner(${index})" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-600 transition shadow-md">Details öffnen</button>
                        </div>
                    `;
                }
            });
        }

        function openPartner(index) {
            const p = partnerDaten[index];
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalCategory').innerText = p.kategorie + " • " + p.stadt;
            document.getElementById('modalDescription').innerHTML = p.beschreibung;
            document.getElementById('modalLocation').innerText = p.stadt;
            document.getElementById('modalPhoneDisplay').innerText = p.telefon;
            document.getElementById('callAction').href = "tel:" + p.telefon;
            document.getElementById('whatsappAction').href = "https://wa.me/" + p.telefon.replace(/\s+/g, '');
            document.getElementById('modalStars').classList.remove('hidden');
            document.getElementById('modalContactBox').classList.remove('hidden');
            document.getElementById('modalActions').classList.remove('hidden');
            let s = ''; for(let i=0; i<Math.floor(p.sterne); i++) s += '<i class="fa-solid fa-star"></i>';
            document.getElementById('modalStars').innerHTML = s + ` <span class="text-slate-400 font-bold ml-1">(${p.sterne})</span>`;
            showModal();
        }

        function openLegal(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalCategory').innerText = "Rechtliches";
            document.getElementById('modalDescription').innerHTML = content;
            document.getElementById('modalStars').classList.add('hidden');
            document.getElementById('modalContactBox').classList.add('hidden');
            document.getElementById('modalActions').classList.add('hidden');
            showModal();
        }

        function showModal() { document.getElementById('detailModal').classList.remove('hidden'); document.body.classList.add('modal-active'); }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); document.body.classList.remove('modal-active'); }
        
        // Starten!
        renderServices();
    </script>
</body>
</html>
